<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Studio</title>
  <script type="module" crossorigin src="/Slush-Wallet/assets/index-DxnzO5R0.js"></script>
  <link rel="stylesheet" crossorigin href="/Slush-Wallet/assets/index-BF8XTd4g.css">
</head>
<body>
<header>
  <h1>gradient studio</h1>
  <span>mesh · radial · wave</span>
</header>
<div class="layout">
  <div class="sidebar">

    <div>
      <div class="seg-label">Gradient type</div>
      <select id="grad-type">
        <option value="mesh">Mesh · swirl</option>
        <option value="radial-h">Radial · horizontal</option>
        <option value="radial-v">Radial · vertical</option>
        <option value="wave-h">Wave · horizontal</option>
        <option value="wave-v">Wave · vertical</option>
      </select>
    </div>

    <div>
      <div class="seg-label">Color stops</div>
      <div class="stops-list" id="stops-list"></div>
      <button class="add-stop" id="add-stop">+ add stop</button>
    </div>

    <div>
      <div class="seg-label">Slush colors <span style="font-size:9px;opacity:.35">(click to add)</span></div>
      <div class="swatch-grid" id="brand-swatches"></div>
    </div>

    <div>
      <div class="seg-label">Speed</div>
      <div class="slider-row"><input type="range" id="speed" min="1" max="12" value="3" step="1"><span class="sval" id="speed-v">3</span></div>
    </div>

    <div>
      <div class="seg-label" id="blobsize-label">Blob size</div>
      <div class="slider-row"><input type="range" id="blobsize" min="20" max="100" value="55" step="1"><span class="sval" id="blobsize-v">55</span></div>
    </div>

    <div id="swirl-sec">
      <div class="seg-label">Swirl</div>
      <div class="slider-row"><input type="range" id="swirl" min="0" max="100" value="50" step="1"><span class="sval" id="swirl-v">50</span></div>
    </div>

    <div>
      <div class="seg-label">Zoom</div>
      <div class="slider-row"><input type="range" id="zoom" min="50" max="300" value="100" step="1"><span class="sval" id="zoom-v">100</span></div>
    </div>

    <div>
      <div class="seg-label">Offset X</div>
      <div class="slider-row"><input type="range" id="offx" min="-100" max="100" value="0" step="1"><span class="sval" id="offx-v">0</span></div>
    </div>

    <div>
      <div class="seg-label">Offset Y</div>
      <div class="slider-row"><input type="range" id="offy" min="-100" max="100" value="0" step="1"><span class="sval" id="offy-v">0</span></div>
    </div>

    <div>
      <div class="seg-label">Softness</div>
      <div class="slider-row"><input type="range" id="blur" min="0" max="80" value="18" step="1"><span class="sval" id="blur-v">18</span></div>
    </div>

    <div>
      <div class="seg-label">Grain</div>
      <div class="toggle-row">
        <button class="toggle on" id="grain-toggle" aria-pressed="true"></button>
        <span class="tl">Film grain</span>
      </div>
      <div class="tab-btns">
        <button class="tab-btn" id="mode-mono">Mono</button>
        <button class="tab-btn active" id="mode-color">Color mix</button>
      </div>
      <div class="slider-row"><span class="tl" style="min-width:46px">Amount</span><input type="range" id="grain-amt" min="0" max="100" value="40" step="1"><span class="sval" id="grain-v">40</span></div>
      <div class="slider-row" style="margin-top:5px"><span class="tl" style="min-width:46px">Size</span><input type="range" id="grain-size" min="1" max="4" value="1" step="1"><span class="sval" id="grain-size-v">1</span></div>
    </div>

    <div>
      <div class="seg-label">GIF length</div>
      <div class="slider-row"><input type="range" id="gif-len" min="5" max="10" value="6" step="1"><span class="sval" id="gif-len-v">6s</span></div>
    </div>

    <div>
      <div class="seg-label">CSS snapshot <span style="font-size:9px;opacity:.35">(click to copy)</span></div>
      <div class="css-block" id="css-out"></div>
    </div>

  </div>

  <div class="preview-area">
    <div class="canvas-wrap">
      <canvas id="gc"></canvas>
      <canvas id="grain"></canvas>
    </div>
    <div class="bottom-bar">
      <button class="btn" id="play-btn">⏸ Pause</button>
      <button class="btn" id="rand-btn">↺ Randomize</button>
      <div class="spacer"></div>
      <button class="btn" id="rec-btn">● Record</button>
      <button class="btn" id="gif-btn">↓ GIF</button>
      <button class="btn" id="dl-btn">↓ PNG</button>
      <button class="btn primary" id="dl2x-btn">↓ PNG @2x</button>
    </div>
  </div>
</div>

</body>
</html>
