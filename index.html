      <div class="brand-sub">Gradient Studio</div>
    </div>

    <div>
      <div class="seg-label">Gradient type</div>
      <select id="grad-type">
        <option value="radial-h">Radial – Horizontal</option>
        <option value="radial-v">Radial – Vertical</option>
        <option value="wave-h">Wave – Horizontal</option>
        <option value="wave-v">Wave – Vertical</option>
        <option value="mesh">Mesh – Swirl</option>
      </select>
    </div>

    <div>
      <div class="seg-label">Presets</div>
      <div class="presets" id="presets"></div>
    </div>

    <div>
      <div class="seg-label">Color stops</div>
      <div class="stops-list" id="stops-list"></div>
      <button class="add-stop" id="add-stop">+ add stop</button>
    </div>

    <div>
      <div class="seg-label">Slush color system <span class="hint">(click to add)</span></div>
      <div class="swatch-grid" id="brand-swatches"></div>
    </div>

    <div>
      <div class="seg-label">Speed</div>
      <div class="slider-row"><input type="range" id="speed" min="1" max="8" value="3" step="1"><span class="sval" id="speed-v">3</span></div>
    </div>

    <div>
      <div class="seg-label" id="blobsize-label">Blob size</div>
      <div class="slider-row"><input type="range" id="blobsize" min="0" max="25" value="10" step="1"><span class="sval" id="blobsize-v">10</span></div>
    </div>

    <div id="swirl-sec">
      <div class="seg-label">Swirl</div>
      <div class="slider-row"><input type="range" id="swirl" min="0" max="40" value="10" step="1"><span class="sval" id="swirl-v">10</span></div>
    </div>

    <div id="stretch-sec">
      <div class="seg-label">Stretch</div>
      <div class="slider-row"><input type="range" id="stretch" min="0" max="30" value="0" step="1"><span class="sval" id="stretch-v">0</span></div>
    </div>

    <div>
      <div class="seg-label">Zoom</div>
      <div class="slider-row"><input type="range" id="zoom" min="100" max="300" value="100" step="1"><span class="sval" id="zoom-v">100</span></div>
    </div>

    <div>
      <div class="seg-label">Offset X</div>
      <div class="slider-row"><input type="range" id="offx" min="-100" max="100" value="0" step="1"><span class="sval" id="offx-v">0</span></div>
    </div>

    <div>
      <div class="seg-label">Offset Y</div>
      <div class="slider-row"><input type="range" id="offy" min="-100" max="100" value="0" step="1"><span class="sval" id="offy-v">0</span></div>
    </div>

    <div>
      <div class="seg-label">Softness</div>
      <div class="slider-row"><input type="range" id="blur" min="0" max="60" value="10" step="1"><span class="sval" id="blur-v">10</span></div>
    </div>

    <div>
      <div class="seg-label">Grain</div>
      <div class="toggle-row">
        <button class="toggle on" id="grain-toggle" aria-pressed="true"></button>
        <span class="tl">Film grain</span>
      </div>
      <div class="tab-btns">
        <button class="tab-btn active" id="grain-fine">Fine</button>
        <button class="tab-btn" id="grain-coarse">Coarse</button>
      </div>
      <div class="slider-row"><span class="tl" style="min-width:46px">Amount</span><input type="range" id="grain-amt" min="0" max="100" value="45" step="1"><span class="sval" id="grain-v">45</span></div>
      <div class="slider-row" style="margin-top:5px"><span class="tl" style="min-width:46px">Size</span><input type="range" id="grain-size" min="1" max="4" value="1" step="1"><span class="sval" id="grain-size-v">1</span></div>
    </div>

    <div>
      <div class="seg-label">GIF length</div>
      <div class="slider-row"><input type="range" id="gif-len" min="5" max="10" value="6" step="1"><span class="sval" id="gif-len-v">6s</span></div>
    </div>

    <div>
      <div class="seg-label">CSS snapshot <span class="hint">(click to copy)</span></div>
      <div class="css-block" id="css-out"></div>
    </div>

  </div>

  <div class="preview-area">
    <div class="canvas-wrap">
      <canvas id="gc"></canvas>
      <canvas id="grain"></canvas>
    </div>
    <div class="bottom-bar">
      <button class="btn" id="play-btn">⏸ Pause</button>
      <button class="btn" id="rand-btn">Surprise me!</button>
      <div class="spacer"></div>
      <button class="btn" id="rec-btn">● Record</button>
      <button class="btn" id="gif-btn">↓ GIF</button>
      <button class="btn" id="dl-btn">↓ PNG</button>
      <button class="btn" id="dl2x-btn">↓ PNG x2</button>
    </div>
  </div>
</div>

</body>
</html>
